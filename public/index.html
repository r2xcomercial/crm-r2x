<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CRM R2X</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0D1B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="R2X CRM">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  :root {
    --navy: #0D1B2E;
    --navy2: #142236;
    --navy3: #1E3352;
    --accent: #00C4B4;
    --accent2: #0099CC;
    --success: #22C55E;
    --warning: #F59E0B;
    --danger: #EF4444;
    --text: #E8EDF5;
    --text2: #94A3B8;
    --border: #243650;
    --card: #162032;
    --card2: #1A2840;
    --white: #FFFFFF;
    --sidebar-w: 240px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w); background: var(--navy2); display: flex; flex-direction: column;
    border-right: 1px solid var(--border); flex-shrink: 0; transition: width .25s;
  }
  .sidebar-logo {
    padding: 20px 16px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--navy); font-size: 16px; flex-shrink: 0; }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--white); line-height: 1.2; }
  .logo-sub { font-size: 10px; color: var(--text2); font-weight: 400; }
  nav { flex: 1; overflow-y: auto; padding: 10px 0; }
  .nav-section { padding: 14px 16px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 600; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    cursor: pointer; color: var(--text2); font-size: 13.5px; border-radius: 0;
    transition: all .15s; position: relative; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--navy3); color: var(--text); }
  .nav-item.active { background: rgba(0,196,180,.1); color: var(--accent); border-left-color: var(--accent); }
  .nav-item .icon { font-size: 17px; width: 20px; text-align: center; }
  .nav-badge { background: var(--accent); color: var(--navy); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: auto; }

  /* ── MAIN ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    height: 56px; background: var(--navy2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0;
  }
  #page-title { font-size: 17px; font-weight: 600; flex: 1; }
  .topbar-btn {
    background: var(--accent); color: var(--navy); border: none; padding: 7px 16px;
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: opacity .15s;
  }
  .topbar-btn:hover { opacity: .85; }
  .topbar-search {
    background: var(--navy3); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; border-radius: 6px; font-size: 13px; width: 200px; outline: none;
  }
  .topbar-search:focus { border-color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── CARDS ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; display: flex; flex-direction: column; gap: 6px;
  }
  .kpi-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--white); }
  .kpi-sub { font-size: 12px; color: var(--text2); }
  .kpi-icon { font-size: 22px; margin-bottom: 4px; }

  /* ── TABLES ── */
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-title { font-size: 14px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); background: var(--card2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.03); }
  .empty-row td { text-align: center; color: var(--text2); padding: 32px; }

  /* ── BADGES ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge-blue { background: rgba(0,153,204,.15); color: #38bdf8; }
  .badge-yellow { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge-red { background: rgba(239,68,68,.15); color: #f87171; }
  .badge-gray { background: rgba(148,163,184,.12); color: var(--text2); }
  .badge-accent { background: rgba(0,196,180,.15); color: var(--accent); }

  /* ── ACTION BUTTONS ── */
  .btn-icon { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 15px; transition: background .15s; }
  .btn-icon:hover { background: var(--navy3); }
  .btn-edit { color: var(--accent2); }
  .btn-delete { color: var(--danger); }
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: var(--navy); }
  .btn-secondary { background: var(--navy3); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: white; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column;
    transform: translateY(20px); transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols1 { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.span2 { grid-column: span 2; }
  label { font-size: 12px; color: var(--text2); font-weight: 500; }
  input, select, textarea {
    background: var(--navy3); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 6px; font-size: 13px; outline: none; width: 100%;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--navy2); }
  textarea { resize: vertical; min-height: 72px; }

  /* ── DASHBOARD EXTRAS ── */
  .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .dash-row.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .mini-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .mini-card h4 { font-size: 13px; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .funil-bar { display: flex; flex-direction: column; gap: 8px; }
  .funil-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .funil-track { flex: 1; background: var(--navy3); border-radius: 4px; height: 8px; overflow: hidden; }
  .funil-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .5s; }
  .funil-count { font-size: 12px; color: var(--text2); min-width: 28px; text-align: right; }
  .aniv-list { display: flex; flex-direction: column; gap: 8px; }
  .aniv-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .aniv-item:last-child { border-bottom: none; }
  .aniv-avatar { width: 32px; height: 32px; background: var(--navy3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .launch-list { display: flex; flex-direction: column; gap: 10px; }
  .launch-item { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .launch-date { background: var(--navy3); border-radius: 6px; padding: 4px 8px; font-size: 11px; color: var(--accent); white-space: nowrap; font-weight: 600; }

  /* ── FINANCEIRO ── */
  .fin-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .fin-tab { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); color: var(--text2); background: none; transition: all .15s; }
  .fin-tab.active { background: var(--accent); color: var(--navy); border-color: var(--accent); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 10px; min-width: 240px; animation: slideIn .25s ease; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .toast-item.success { border-left: 3px solid var(--success); }
  .toast-item.error { border-left: 3px solid var(--danger); }
  @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media(max-width: 768px) {
    #sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.span2 { grid-column: span 1; }
    .dash-row, .dash-row.cols3 { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">R2</div>
    <div>
      <div class="logo-text">R2X CRM</div>
      <div class="logo-sub">Aceleradora de Vendas</div>
    </div>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="navigate('dashboard')"><span class="icon">📊</span> Dashboard</div>
    <div class="nav-item" onclick="navigate('calendario')"><span class="icon">📅</span> Calendário</div>

    <div class="nav-section">Comercial</div>
    <div class="nav-item" onclick="navigate('leads')"><span class="icon">🎯</span> Leads <span class="nav-badge" id="badge-leads">0</span></div>
    <div class="nav-item" onclick="navigate('vendas')"><span class="icon">🏆</span> Vendas</div>
    <div class="nav-item" onclick="navigate('ranking')"><span class="icon">⭐</span> Ranking</div>

    <div class="nav-section">Cadastros</div>
    <div class="nav-item" onclick="navigate('clientes')"><span class="icon">🏢</span> Clientes</div>
    <div class="nav-item" onclick="navigate('empreendimentos')"><span class="icon">🏗️</span> Empreendimentos</div>
    <div class="nav-item" onclick="navigate('corretores')"><span class="icon">👥</span> Corretores</div>

    <div class="nav-section">Financeiro</div>
    <div class="nav-item" onclick="navigate('financeiro')"><span class="icon">💰</span> Financeiro</div>
  </nav>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="page-title">Dashboard</div>
    <input class="topbar-search" type="text" id="search-box" placeholder="🔍  Buscar..." oninput="handleSearch(this.value)">
    <button class="topbar-btn" id="add-btn" onclick="handleAdd()" style="display:none">+ Novo</button>
  </div>
  <div id="content"><!-- rendered by JS --></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Título</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = '';
let currentPage = 'dashboard';
let currentData = {};

// ─── NAVIGATION ───────────────────────────────────────────────────────────────

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[onclick="navigate('${page}')"]`)?.classList.add('active');
  document.getElementById('page-title').textContent = pageTitles[page] || page;
  document.getElementById('search-box').value = '';
  document.getElementById('add-btn').style.display = addablePages.includes(page) ? 'flex' : 'none';
  renderPage(page);
}

const pageTitles = {
  dashboard: 'Dashboard', leads: 'Leads', vendas: 'Vendas',
  clientes: 'Clientes', empreendimentos: 'Empreendimentos', corretores: 'Corretores',
  financeiro: 'Financeiro', calendario: 'Calendário de Lançamentos', ranking: 'Ranking de Corretores'
};
const addablePages = ['leads','vendas','clientes','empreendimentos','corretores','financeiro','calendario'];

async function renderPage(page) {
  const c = document.getElementById('content');
  c.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text2)">Carregando...</div>`;
  try {
    switch(page) {
      case 'dashboard': await renderDashboard(); break;
      case 'leads': await renderLeads(); break;
      case 'vendas': await renderVendas(); break;
      case 'clientes': await renderClientes(); break;
      case 'empreendimentos': await renderEmpreendimentos(); break;
      case 'corretores': await renderCorretores(); break;
      case 'financeiro': await renderFinanceiro(); break;
      case 'calendario': await renderCalendario(); break;
      case 'ranking': await renderRanking(); break;
    }
  } catch(e) {
    c.innerHTML = `<div style="color:var(--danger);padding:24px">Erro ao carregar: ${e.message}</div>`;
  }
}

// ─── API HELPERS ──────────────────────────────────────────────────────────────

const TOKEN = localStorage.getItem('crm_token') || '';

async function api(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-crm-token': TOKEN },
    body: body ? JSON.stringify(body) : undefined
  });
  if (r.status === 401) { localStorage.removeItem('crm_token'); window.location.href = '/login'; return; }
  return r.json();
}
const get = p => api('GET', p);
const post = (p, b) => api('POST', p, b);
const put = (p, b) => api('PUT', p, b);
const del = p => api('DELETE', p);

// ─── DASHBOARD ───────────────────────────────────────────────────────────────

async function renderDashboard() {
  const { data } = await get('/api/dashboard');
  const { kpis, aniversarios_mes, proximos_lancamentos, funil } = data;

  // Update badge
  document.getElementById('badge-leads').textContent = kpis.leads_novos;

  const statusLabel = { novo: 'Novo', qualificado: 'Qualificado', visitou: 'Visitou', proposta: 'Proposta', vendido: 'Vendido', perdido: 'Perdido' };
  const totalLeads = funil.reduce((s, f) => s + f.n, 0) || 1;

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      ${kpi('🎯', 'Leads Novos', kpis.leads_novos, `${kpis.leads_total} total`)}
      ${kpi('🏆', 'Vendas no Mês', fmt(kpis.vendas_mes), `${kpis.vendas_total} negócios ativos`)}
      ${kpi('💰', 'Recebíveis Pendentes', fmt(kpis.entradas_pendentes), 'a receber')}
      ${kpi('🏗️', 'Empreendimentos', kpis.empreendimentos, '')}
      ${kpi('🏢', 'Clientes', kpis.clientes_total, 'loteadores/incorporadores')}
      ${kpi('👥', 'Corretores Ativos', kpis.corretores_ativos, '')}
    </div>
    <div class="dash-row">
      <div class="mini-card">
        <h4>🎯 Funil de Leads</h4>
        <div class="funil-bar">
          ${funil.map(f => `
            <div class="funil-item">
              <span style="min-width:90px;font-size:12px;color:var(--text2)">${statusLabel[f.status]||f.status}</span>
              <div class="funil-track"><div class="funil-fill" style="width:${Math.round(f.n/totalLeads*100)}%"></div></div>
              <span class="funil-count">${f.n}</span>
            </div>
          `).join('') || '<div style="color:var(--text2);font-size:13px">Sem leads ainda</div>'}
        </div>
      </div>
      <div class="mini-card">
        <h4>🎂 Aniversários do Mês</h4>
        <div class="aniv-list">
          ${aniversarios_mes.length ? aniversarios_mes.slice(0,6).map(a => `
            <div class="aniv-item">
              <div class="aniv-avatar">${a.tipo === 'corretor' ? '👤' : a.tipo === 'cliente' ? '🏢' : '🎯'}</div>
              <div><div style="font-weight:500">${a.nome||'—'}</div><div style="font-size:11px;color:var(--text2)">${a.tipo} · ${fmtDate(a.aniversario)}</div></div>
            </div>
          `).join('') : '<div style="color:var(--text2);font-size:13px">Nenhum aniversário este mês</div>'}
        </div>
      </div>
    </div>
    <div class="mini-card" style="margin-bottom:20px">
      <h4>📅 Próximos Lançamentos</h4>
      <div class="launch-list" style="margin-top:4px">
        ${proximos_lancamentos.length ? proximos_lancamentos.map(l => `
          <div class="launch-item">
            <div class="launch-date">${fmtDate(l.data)}</div>
            <div>
              <span style="font-weight:500">${l.titulo}</span>
              ${l.empreendimento_nome ? `<span style="color:var(--text2);font-size:12px"> · ${l.empreendimento_nome}</span>` : ''}
            </div>
            <span class="badge ${badgeCalendario(l.tipo)}">${l.tipo}</span>
          </div>
        `).join('') : '<div style="color:var(--text2);font-size:13px">Nenhum evento agendado</div>'}
      </div>
    </div>
  `;
}

function kpi(icon, label, value, sub) {
  return `<div class="kpi-card"><div class="kpi-icon">${icon}</div><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${sub ? `<div class="kpi-sub">${sub}</div>` : ''}</div>`;
}

// ─── LEADS ───────────────────────────────────────────────────────────────────

let leadsData = [], corretoresData = [], empData = [];

async function renderLeads(filter = '') {
  const [lr, cr, er] = await Promise.all([get('/api/leads'), get('/api/corretores'), get('/api/empreendimentos')]);
  leadsData = lr.data; corretoresData = cr.data; empData = er.data;
  const leads = filter ? leadsData.filter(l => (l.nome||'').toLowerCase().includes(filter) || (l.telefone||'').includes(filter) || (l.cidade||'').toLowerCase().includes(filter)) : leadsData;
  document.getElementById('badge-leads').textContent = leadsData.filter(l => l.status==='novo').length;

  const statusColors = { novo:'badge-accent', qualificado:'badge-blue', visitou:'badge-yellow', proposta:'badge-yellow', vendido:'badge-green', perdido:'badge-red' };

  document.getElementById('content').innerHTML = `
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">🎯 Leads (${leads.length})</div>
        <div style="display:flex;gap:8px">
          <select onchange="filterLeadStatus(this.value)" style="font-size:12px;padding:6px 10px">
            <option value="">Todos os status</option>
            <option value="novo">Novo</option>
            <option value="qualificado">Qualificado</option>
            <option value="visitou">Visitou</option>
            <option value="proposta">Proposta</option>
            <option value="vendido">Vendido</option>
            <option value="perdido">Perdido</option>
          </select>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Nome</th><th>Telefone</th><th>Cidade</th><th>Objetivo</th>
          <th>Faixa</th><th>Status</th><th>Corretor</th><th>Empreendimento</th><th>Origem</th><th></th>
        </tr></thead>
        <tbody>
          ${leads.length ? leads.map(l => `
            <tr>
              <td><strong>${l.nome||'—'}</strong></td>

let finTab = 'entradas';

async function renderFinanceiro(filter = '') {
  const [er, sr, dr, empr, resr] = await Promise.all([get('/api/financeiro/entradas'), get('/api/financeiro/saidas'), get('/api/financeiro/distribuicoes'), get('/api/empreendimentos'), get('/api/financeiro/resumo')]);
  currentData.entradas = er.data; currentData.saidas = sr.data; currentData.distribuicoes = dr.data; currentData.emp = empr.data;
  const resumo = resr.data;

  const totalEntradas = er.data.filter(e => e.status==='recebido').reduce((s,e) => s+e.valor, 0);
  const totalSaidas = sr.data.filter(e => e.status==='pago').reduce((s,e) => s+e.valor, 0);
  const totalDist = dr.data.reduce((s,d) => s+d.valor, 0);
  const saldo = totalEntradas - totalSaidas - totalDist;

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:20px">
      ${kpi('📥', 'Total Recebido', fmt(totalEntradas), 'entradas confirmadas')}
      ${kpi('📤', 'Total Pago', fmt(totalSaidas), 'saídas pagas')}
      ${kpi('💸', 'Distribuído Ramon', fmt(totalDist), 'retiradas')}
      ${kpi('💰', 'Saldo Líquido', fmt(saldo), 'recebido - pago - distribuído')}
    </div>
    <div class="fin-tabs">
      <button class="fin-tab ${finTab==='entradas'?'active':''}" onclick="setFinTab('entradas')">📥 Entradas</button>
      <button class="fin-tab ${finTab==='saidas'?'active':''}" onclick="setFinTab('saidas')">📤 Saídas</button>
      <button class="fin-tab ${finTab==='distribuicoes'?'active':''}" onclick="setFinTab('distribuicoes')">💸 Distribuição</button>
      <button class="fin-tab ${finTab==='resumo'?'active':''}" onclick="setFinTab('resumo')">📊 Por Empreendimento</button>
    </div>
    <div id="fin-content"></div>
  `;
  renderFinTab();
}

async function filterRanking(val, tipo) {
  const params = new URLSearchParams();
  if (tipo === 'emp' && val) params.set('empreendimento_id', val);
  if (tipo === 'periodo' && val) params.set('periodo', val);
  const r = await get(`/api/vendas/ranking?${params}`);
  document.getElementById('ranking-body').innerHTML = r.data.length ? r.data.map((row, i) => `
    <tr>
      <td><span style="font-weight:700;color:${i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--text2)'}">${i+1}º</span></td>
      <td><strong>${row.nome}</strong></td><td>${row.imobiliaria||'—'}</td>
      <td style="text-align:center"><span class="badge badge-blue">${row.vendas}</span></td>
      <td style="color:var(--success);font-weight:600">${fmt(row.vgv)}</td>
    </tr>
  `).join('') : '<tr class="empty-row"><td colspan="5">Nenhuma venda</td></tr>';
}

function handleSearch(q) {
  const f = q.toLowerCase().trim();
  switch(currentPage) {
    case 'leads': renderLeads(f); break;
    case 'vendas': renderVendas(f); break;
    case 'clientes': renderClientes(f); break;
    case 'empreendimentos': renderEmpreendimentos(f); break;
    case 'corretores': renderCorretores(f); break;
  }
}

function handleAdd() {
  switch(currentPage) {
    case 'leads': openLeadModal(); break;
    case 'vendas': openVendaModal(); break;
    case 'clientes': openClienteModal(); break;
    case 'empreendimentos': openEmpModal(); break;
    case 'corretores': openCorretorModal(); break;
    case 'financeiro': finTab==='entradas' ? openEntradaModal() : finTab==='saidas' ? openSaidaModal() : finTab==='distribuicoes' ? openDistModal() : openCalModal(); break;
    case 'calendario': openCalModal(); break;
  }
}

// ─── MODAL UTILS ─────────────────────────────────────────────────────────────

function openModal(title, bodyHtml, onSave) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-foot').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="modalSave()">Salvar</button>
  `;
  window._modalSave = onSave;
  document.getElementById('modal-overlay').classList.add('open');
}
function modalSave() { window._modalSave && window._modalSave(); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function v(id) { return document.getElementById(id)?.value || ''; }
function fmt(n) { return (n||0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtDate(d) { if (!d) return '—'; const [y,m,day] = d.split('T')[0].split('-'); return `${day}/${m}/${y}`; }
function fmtPhone(p) { if (!p) return '—'; const n = p.replace(/\D/g,''); return n.length===11 ? `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}` : p; }
function today() { return new Date().toISOString().split('T')[0]; }
function badgeCalendario(tipo) { const m = {'lançamento':'badge-accent','pré-lançamento':'badge-yellow','evento':'badge-blue','reunião':'badge-gray'}; return m[tipo]||'badge-gray'; }

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `${type==='success'?'✅':'❌'} ${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

// Redireciona para login se não tiver token
if (!TOKEN) { window.location.href = '/login'; }

renderPage('dashboard');

// PWA — registra service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
