<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Corretor — R2X</title>
<style>
  :root { --navy: #0D1B2E; --accent: #00C4B4; --border: #243650; --card: #162032; --text: #E8EDF5; --text2: #94A3B8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 500px; padding: 36px; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-mark { width: 52px; height: 52px; background: var(--accent); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; color: var(--navy); font-size: 22px; margin-bottom: 10px; }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 5px; }
  input, select { width: 100%; background: #1A2840; border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: #0D1B2E; }
  .btn { width: 100%; padding: 13px; background: var(--accent); color: var(--navy); border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .success-box { display: none; text-align: center; padding: 28px 0; }
  .success-icon { font-size: 56px; margin-bottom: 12px; }
  .success-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .success-sub { font-size: 14px; color: var(--text2); }
  .required { color: var(--accent); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width: 480px) { .grid2 { grid-template-columns: 1fr; } .card { padding: 24px; } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/icon-192.png" style="width:56px;height:56px;border-radius:14px;margin-bottom:10px">
    <h1>Cadastro de Corretor</h1>
    <p class="subtitle">Inteligência Comercial em Lançamentos Imobiliários — Preencha seus dados para integrar nossa rede</p>
  </div>

  <form id="form" onsubmit="enviar(event)">
    <div class="form-group">
      <label>Nome completo <span class="required">*</span></label>
      <input id="nome" type="text" placeholder="Seu nome completo" required>
    </div>
    <div class="grid2">
      <div class="form-group">
        <label>CPF</label>
        <input id="cpf" type="text" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)">
      </div>
      <div class="form-group">
        <label>CRECI</label>
        <input id="creci" type="text" placeholder="SC-12345">
      </div>
    </div>
    <div class="form-group">
      <label>WhatsApp <span class="required">*</span></label>
      <input id="telefone" type="tel" placeholder="(48) 99999-9999" required oninput="maskPhone(this)">
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Imobiliária / Empresa</label>
      <input id="imobiliaria" type="text" placeholder="Nome da imobiliária (ou autônomo)">
    </div>
    <div class="grid2">
      <div class="form-group">
        <label>Cidade</label>
        <input id="cidade" type="text" placeholder="Criciúma">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="estado">
          <option value="">—</option>
          <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
          <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
          <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
          <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
          <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
          <option>RS</option><option>RO</option><option>RR</option><option selected>SC</option>
          <option>SP</option><option>SE</option><option>TO</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Data de Nascimento</label>
      <input id="aniversario" type="date">
    </div>
    <button type="submit" class="btn" id="btn-enviar">Enviar Cadastro</button>
  </form>

  <div class="success-box" id="success-box">
    <div class="success-icon">🎉</div>
    <div class="success-title">Cadastro realizado!</div>
    <div class="success-sub">Bem-vindo à rede R2X.<br>Em breve entraremos em contato pelo WhatsApp.</div>
  </div>
</div>

<script>
function maskPhone(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if (v.length >= 7) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if (v.length >= 3) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
  el.value = v;
}
function maskCPF(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if (v.length >= 10) v = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6,9)}-${v.slice(9)}`;
  else if (v.length >= 7) v = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6)}`;
  else if (v.length >= 4) v = `${v.slice(0,3)}.${v.slice(3)}`;
  el.value = v;
}

async function enviar(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-enviar');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const tel = document.getElementById('telefone').value.replace(/\D/g,'');
  const body = {
    nome: document.getElementById('nome').value,
    cpf: document.getElementById('cpf').value,
    creci: document.getElementById('creci').value,
    telefone: tel,
    email: document.getElementById('email').value,
    imobiliaria: document.getElementById('imobiliaria').value,
    cidade: document.getElementById('cidade').value,
    estado: document.getElementById('estado').value,
    aniversario: document.getElementById('aniversario').value,
  };

  try {
    const r = await fetch('/api/corretores/publico', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    document.getElementById('form').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
  } catch(err) {
    alert('Erro: ' + err.message);
    btn.disabled = false; btn.textContent = 'Enviar Cadastro';
  }
}
</script>
</body>
</html>
